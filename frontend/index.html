<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SunGrid Cooperative Copilot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <svg class="brand-mark" viewBox="0 0 32 32" width="26" height="26" aria-hidden="true">
          <circle cx="16" cy="16" r="6" fill="var(--amber)"/>
          <g stroke="var(--teal)" stroke-width="2" stroke-linecap="round">
            <line x1="16" y1="2" x2="16" y2="7"/>
            <line x1="16" y1="25" x2="16" y2="30"/>
            <line x1="2" y1="16" x2="7" y2="16"/>
            <line x1="25" y1="16" x2="30" y2="16"/>
            <line x1="5.5" y1="5.5" x2="9" y2="9"/>
            <line x1="23" y1="23" x2="26.5" y2="26.5"/>
            <line x1="5.5" y1="26.5" x2="9" y2="23"/>
            <line x1="23" y1="9" x2="26.5" y2="5.5"/>
          </g>
        </svg>
        <div>
          <div class="brand-name">SunGrid</div>
          <div class="brand-sub">Cooperative Copilot</div>
        </div>
      </div>

      <button class="new-chat-btn" id="newChatBtn">
        <span class="plus">+</span> New chat
      </button>

      <nav class="thread-list" id="threadList" aria-label="Chat threads"></nav>

      <div class="sidebar-footer">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">checking backend…</span>
      </div>
    </aside>

    <main class="chat-pane">
      <header class="chat-header">
        <h1 id="threadTitle">New chat</h1>
        <span class="header-tag">internal · staff &amp; member support</span>
      </header>

      <div class="messages" id="messages">
        <div class="empty-state" id="emptyState">
          <div class="empty-glyph">☀</div>
          <p>Ask about program policies, rebates, billing, installation, or check a household's rebate eligibility.</p>
        </div>
      </div>

      <form class="composer" id="composer">
        <textarea
          id="questionInput"
          placeholder="Ask the copilot…"
          rows="1"
          autocomplete="off"
        ></textarea>
        <button type="submit" id="sendBtn" aria-label="Send">
          <svg viewBox="0 0 20 20" width="18" height="18" fill="none" aria-hidden="true">
            <path d="M2 10l16-7-6 16-2.5-6.5L2 10z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
          </svg>
        </button>
      </form>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
